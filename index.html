<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motown Custom Cycles | Detroit</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #f37021; --dark: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background-color: var(--dark); color: white; }
        nav { background: rgba(0,0,0,0.9); padding: 1.5rem; text-align: center; border-bottom: 3px solid var(--primary); width: 100%; position: fixed; z-index: 10; }
        header { 
            height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('motown_bikes.jpg') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
        }
        header h1 { font-size: 4.5rem; text-transform: uppercase; line-height: 0.8; color: white; }
        .btn { background: var(--primary); color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; margin-top: 25px; font-weight: bold; display: inline-block; }
        .section { padding: 60px 10%; text-align: center; }
    </style>
</head>
<body>
    <nav>MOTOWN CUSTOM CYCLES - DETROIT</nav>
    <header>
        <h1>MOTOWN<br>CUSTOM CYCLES</h1>
        <p style="color:var(--primary); letter-spacing: 5px; font-size: 1.5rem; margin-top: 15px;">EST. 1992</p>
        <a href="https://www.facebook.com/motowncustomcycles" class="btn" target="_blank">VISIT FACEBOOK</a>
    </header>
    <section class="section">
        <h2>5671 Michigan Ave, Detroit, MI</h2>
        <p style="margin-top:20px;">Harley-Davidson Specialists | Fabrication | Custom Paint</p>
        <p style="margin-top:10px;">Call: (313) 262-6022</p>
    </section>
</body>
</html>
